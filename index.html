<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4B — Horas Cátedra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
  --g: #107C10;
  --gl: #52B043;
  --gn: #00FF41;
  --glow: rgba(16,124,16,0.3);
  --bg: #090909;
  --s1: #111;
  --s2: #181818;
  --s3: #202020;
  --s4: #282828;
  --text: #fff;
  --t2: #aaa;
  --t3: #555;
  --border: rgba(255,255,255,0.06);
  --danger: #E74856;
  --warn: #FFB900;
  --r: 4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* NAV */
nav{
  position:sticky;top:0;z-index:50;
  height:52px;padding:0 1.5rem;
  background:rgba(9,9,9,0.94);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;
}
.logo{display:flex;align-items:center;gap:9px}
.xbtn{
  width:26px;height:26px;border-radius:50%;
  background:var(--g);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 10px var(--glow);flex-shrink:0;
}
.xbtn svg{width:14px;height:14px}
.nav-t{font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.nav-s{font-size:10px;color:var(--t2);letter-spacing:.1em;text-transform:uppercase}
.nav-r{display:flex;align-items:center;gap:8px}
.nav-r label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
/* WEEK PICKER (custom, replaces the native <input type=week> in the nav
   so we can highlight weeks that contain absences — the native picker
   doesn't allow styling individual dates). */
.week-picker{position:relative}
.week-btn{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);padding:5px 10px;font-size:12px;font-family:inherit;
  display:flex;align-items:center;gap:8px;cursor:pointer;outline:none;
  transition:border-color .15s;
}
.week-btn:hover,.week-btn.open{border-color:var(--g)}
.week-btn svg{color:var(--t3);flex-shrink:0;transition:transform .15s}
.week-btn.open svg{transform:rotate(180deg)}

.week-pop{
  position:absolute;top:calc(100% + 8px);right:0;z-index:100;
  background:#15151a;border:1px solid var(--border);border-radius:8px;
  padding:.9rem;width:280px;
  box-shadow:0 16px 40px rgba(0,0,0,.6);
  opacity:0;transform:translateY(-6px);pointer-events:none;
  transition:opacity .15s,transform .15s;
}
.week-pop.open{opacity:1;transform:translateY(0);pointer-events:all}
.wp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.wp-month{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:capitalize}
.wp-nav{display:flex;gap:4px}
.wp-nav button{
  width:22px;height:22px;border-radius:4px;border:none;background:var(--s3);
  color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;font-size:11px;
}
.wp-nav button:hover{background:var(--s4);color:var(--text)}
.wp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:10px}
.wp-dow{color:var(--t3);text-align:center;padding:3px 0;font-weight:700;text-transform:uppercase;font-size:9px}
.wp-week-row{
  display:contents;cursor:pointer;
}
.wp-day{
  text-align:center;padding:5px 0;border-radius:3px;color:var(--t2);position:relative;
  transition:background .12s;
}
.wp-week-row:hover .wp-day{background:var(--s3)}
.wp-week-row.selected .wp-day{background:rgba(16,124,16,.28);color:var(--text)}
.wp-week-row.current .wp-day{box-shadow:inset 0 0 0 1px var(--g)}
.wp-day.dim{color:var(--t3);opacity:.4}
.wp-day.has-absence::after{
  content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--danger);
}
.wp-week-row.selected .wp-day.has-absence::after{background:var(--danger)}
.wp-foot{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:.8rem;padding-top:.7rem;border-top:1px solid var(--border);
}
.wp-link{
  background:none;border:none;color:var(--t2);font-size:11px;font-family:inherit;
  cursor:pointer;padding:0;transition:color .15s;
}
.wp-link:hover{color:var(--text)}
.wp-link.accent{color:var(--gl);font-weight:700}
.wp-link.accent:hover{color:var(--gn)}
.wp-legend{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--t3);margin-top:.6rem}
.wp-legend .dot{width:5px;height:5px;border-radius:50%;background:var(--danger);flex-shrink:0}

/* STATS */
.stats{
  display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:2px;
  margin:1rem 1.5rem 0;border-radius:6px;overflow:hidden;
  position:sticky;top:52px;z-index:40;
  box-shadow:0 12px 24px -8px rgba(0,0,0,.6);
}
.stat{background:var(--s2);padding:1.1rem 1.2rem;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:var(--g);opacity:.25}
.stat:first-child::before{opacity:1}
.stat-l{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.stat-v{font-size:32px;font-weight:800;line-height:1}
.stat-v.r{color:var(--danger)}
.stat-v.y{color:var(--warn)}
.stat-v.g{color:var(--gl);font-size:16px;margin-top:4px}

/* progress card */
.stat-progress{padding-bottom:1rem}
.stat-prog-row{display:flex;align-items:baseline;gap:5px}
.stat-prog-row .stat-v{font-size:32px;transition:color .3s}
.stat-den{font-size:11px;color:var(--t3);font-weight:600}
.progress-track{
  margin-top:9px;height:7px;border-radius:4px;
  background:rgba(255,255,255,.06);overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:4px;width:100%;
  background:linear-gradient(90deg,var(--gl),var(--gn));
  box-shadow:0 0 10px var(--glow);
  transition:width .4s ease,background .4s ease;
}

/* clickable card + breakdown */
.stat-clickable{cursor:pointer;transition:background .15s}
.stat-clickable:hover{background:var(--s3)}
.stat-hint{font-size:9px;color:var(--t3);margin-top:5px;letter-spacing:.04em}
.breakdown{
  margin:0 1.5rem;max-height:0;overflow:hidden;
  transition:max-height .25s ease;
  background:var(--s2);border-radius:0 0 6px 6px;
}
.breakdown.open{max-height:340px;overflow-y:auto}
.bd-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;border-top:1px solid var(--border);
}
.bd-name{flex:1;font-size:11px;font-weight:600}
.bd-track{width:90px;height:5px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden;flex-shrink:0}
.bd-fill{height:100%;background:var(--danger);border-radius:3px}
.bd-count{font-size:11px;font-weight:700;color:var(--t2);width:48px;text-align:right;flex-shrink:0}

/* CALENDAR SECTION */
.cal-header{
  padding:1.4rem 1.5rem .6rem;
  display:flex;align-items:center;justify-content:space-between;
}
.sec-title{
  font-size:10px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--t3);
  display:flex;align-items:center;gap:8px;
}
.sec-title::before{content:'';width:10px;height:2px;background:var(--g);display:block}
.btn-add{
  background:var(--g);border:none;border-radius:var(--r);
  color:#fff;font-family:inherit;font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;padding:7px 14px;cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:background .15s,box-shadow .15s;
}
.btn-add:hover{background:var(--gl);box-shadow:0 0 14px var(--glow)}

/* CALENDAR TABLE */
.cal-wrap{overflow-x:auto;padding:0 1.5rem 1rem}
.cal{
  width:100%;border-collapse:collapse;
  min-width:600px;
}
/* column widths */
.cal colgroup col:first-child{width:120px}

.cal thead{position:relative;z-index:5}
.cal thead th{
  padding:8px 10px;
  text-align:center;
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);
  background:var(--s1);
  border-bottom:1px solid var(--border);
}
.cal thead th.today-col{
  color:var(--gn);
  background:rgba(0,255,65,.04);
}
.cal thead th .day-name{font-size:11px;font-weight:800;letter-spacing:.1em}
.cal thead th .day-date{font-size:10px;color:var(--t3);margin-top:2px}
.cal thead th.today-col .day-date{color:var(--gl)}

/* today badge */
.today-badge{
  display:inline-block;
  background:var(--g);color:#fff;
  font-size:8px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 6px;border-radius:2px;margin-top:3px;
  box-shadow:0 0 8px var(--glow);
}

/* ROW */
.cal tbody tr{border-bottom:1px solid var(--border)}
.cal tbody tr:hover .row-header{color:var(--text)}

/* Row header */
.row-header{
  padding:0 10px;
  vertical-align:middle;
  background:var(--s1);
  border-right:1px solid var(--border);
}
.rh-name{font-size:12px;font-weight:700;color:var(--text)}
.rh-doc{font-size:10px;color:var(--t3);margin-top:1px}
.rh-total{
  display:flex;align-items:center;gap:4px;margin-top:5px;
}
.rh-num{
  font-size:19px;font-weight:800;line-height:1;
  color:var(--t3);transition:color .2s;
}
.rh-num.y{color:var(--warn)}
.rh-num.r{color:var(--danger)}
.rh-den{font-size:10px;color:var(--t3)}

/* CELL */
.cell{
  padding:5px;vertical-align:top;
  border-right:1px solid var(--border);
  min-width:100px;
}
.cell.today-col{background:rgba(0,255,65,.025)}
.cell.no-class{background:var(--s1);cursor:default}

/* SLOT */
.slot{
  border-radius:var(--r);overflow:hidden;
  position:relative;margin-bottom:3px;
}
.slot:last-child{margin-bottom:0}
.slot-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;gap:6px;
  background:var(--s3);
  cursor:pointer;
  transition:background .15s;
  position:relative;
  overflow:hidden;
}
.slot-inner::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--g);opacity:.4;transition:opacity .2s;
}
.slot-inner:hover::before{opacity:1}
.slot-inner:hover{background:var(--s4)}
.slot-inner.absent{background:rgba(231,72,86,.13);cursor:default}
.slot-inner.absent::before{background:var(--danger);opacity:1}

.slot-hora{
  font-size:9px;font-weight:700;letter-spacing:.06em;
  color:var(--t2);text-transform:uppercase;white-space:nowrap;
}
.slot-hora.absent{color:var(--danger)}
.slot-plus{
  width:16px;height:16px;border-radius:50%;
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--t3);flex-shrink:0;
  transition:background .15s,color .15s;
}
.slot-inner:hover .slot-plus{background:var(--g);color:#fff}
.slot-inner.absent .slot-plus{
  background:rgba(231,72,86,.2);color:var(--danger);
  font-size:10px;cursor:pointer;
}
.slot-inner.absent .slot-plus:hover{background:var(--danger);color:#fff}

/* RECREO */
.recreo-row td{
  background:rgba(255,255,255,.015);
  padding:5px 10px;
  text-align:center;
  font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--t3);
  border-bottom:1px solid var(--border);
  border-top:1px solid var(--border);
}

/* HISTORY */
.hist-wrap{padding:0 1.5rem 2rem;display:flex;flex-direction:column;gap:2px}
.hist-item{
  background:var(--s2);border-radius:var(--r);
  padding:10px 12px;display:flex;align-items:center;gap:10px;
  transition:background .15s;
}
.hist-item:hover{background:var(--s3)}
.hw-badge{
  background:rgba(16,124,16,.15);border:1px solid rgba(16,124,16,.25);
  border-radius:var(--r);padding:2px 6px;
  font-size:9px;font-weight:700;color:var(--gl);
  letter-spacing:.05em;white-space:nowrap;flex-shrink:0;
}
.hd-badge{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;
}
.hd-badge.LU{background:rgba(16,124,16,.2);color:#52B043}
.hd-badge.MA{background:rgba(82,176,67,.15);color:#7EC862}
.hd-badge.MI{background:rgba(0,180,100,.15);color:#00C864}
.hd-badge.JU{background:rgba(255,185,0,.15);color:#FFB900}
.hd-badge.VI{background:rgba(231,72,86,.15);color:#E74856}
.hi-info{flex:1}
.hi-name{font-size:12px;font-weight:600}
.hi-meta{font-size:10px;color:var(--t3);margin-top:1px}
.hi-obs{font-size:10px;color:var(--t2);font-style:italic;margin-top:2px}
.hi-del{
  background:none;border:1px solid rgba(231,72,86,.2);border-radius:var(--r);
  color:rgba(231,72,86,.4);width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;flex-shrink:0;transition:all .15s;
}
.hi-del:hover{background:rgba(231,72,86,.1);border-color:var(--danger);color:var(--danger)}
.empty{text-align:center;padding:2rem;color:var(--t3);font-size:12px;letter-spacing:.04em}

/* MODAL */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--s2);
  border:1px solid rgba(16,124,16,.25);border-radius:8px;
  padding:1.8rem;width:min(400px,90vw);
  box-shadow:0 0 40px rgba(16,124,16,.1),0 8px 32px rgba(0,0,0,.6);
  transform:translateY(8px);transition:transform .2s;
}
.overlay.open .modal{transform:translateY(0)}
.m-head{display:flex;align-items:center;gap:9px;margin-bottom:1.4rem}
.m-icon{width:30px;height:30px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 12px var(--glow)}
.m-title{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.fg{margin-bottom:.9rem}
.fl{display:block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.fc{
  width:100%;background:var(--s3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-family:inherit;font-size:12px;padding:8px 10px;outline:none;
  transition:border-color .15s;appearance:none;
}
.fc:focus{border-color:var(--g);box-shadow:0 0 0 2px var(--glow)}
.fc option{background:#1a1a1a}
textarea.fc{resize:none;height:60px}
.m-info{
  background:rgba(16,124,16,.08);border:1px solid rgba(16,124,16,.15);
  border-radius:var(--r);padding:8px 10px;font-size:11px;color:var(--t2);
  margin-bottom:.9rem;display:none;
}
.m-info.show{display:block}
.m-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:1.3rem}
.btn-cancel{
  background:none;border:1px solid var(--border);border-radius:var(--r);
  color:var(--t2);font-family:inherit;font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;cursor:pointer;transition:all .15s;
}
.btn-cancel:hover{border-color:var(--t2);color:var(--text)}
.btn-save{
  background:var(--g);border:none;border-radius:var(--r);color:#fff;
  font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;padding:8px 18px;cursor:pointer;transition:all .15s;
}
.btn-save:hover{background:var(--gl);box-shadow:0 0 14px var(--glow)}

/* REPORT MODAL extras */
.modal-wide{width:min(460px,90vw)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.period-tabs{display:flex;gap:6px}
.period-tab{
  flex:1;background:var(--s3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--t2);font-family:inherit;font-size:11px;font-weight:700;
  padding:8px 6px;cursor:pointer;transition:all .15s;text-align:center;
}
.period-tab:hover{border-color:var(--t2);color:var(--text)}
.period-tab.active{background:rgba(16,124,16,.18);border-color:var(--g);color:var(--gn)}
.rep-preview{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 12px;margin-top:.4rem;font-size:11px;color:var(--t2);line-height:1.5;
}
.rep-preview b{color:var(--text)}
.rep-preview .rep-warn{color:var(--warn);margin-top:4px;display:block}

/* SCHEDULE EDITOR */
.modal-xwide{width:min(640px,94vw);max-height:88vh;display:flex;flex-direction:column}
.modal-xwide .m-actions{flex-shrink:0}
#schedTabMaterias,#schedTabModulos{overflow-y:auto;flex:1;min-height:0}
.sched-list{display:flex;flex-direction:column;gap:10px;max-height:50vh;overflow-y:auto;padding-right:4px;margin-bottom:.8rem}

.mat-group{
  background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:10px 12px;
}
.mat-group-head{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.mat-group-head input{flex:1}
.mat-input{
  background:var(--s3);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-family:inherit;font-size:12px;padding:6px 9px;outline:none;
  transition:border-color .15s;
}
.mat-input:focus{border-color:var(--g)}
.mat-input.mat-name{font-weight:700}
.btn-icon{
  width:26px;height:26px;border-radius:var(--r);border:1px solid var(--border);
  background:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;transition:all .15s;
}
.btn-icon:hover{border-color:var(--danger);color:var(--danger)}
.btn-icon.add:hover{border-color:var(--gl);color:var(--gl)}

.clase-row{
  display:grid;grid-template-columns:90px 1fr 26px;gap:6px;align-items:center;margin-top:6px;
}
.clase-row select.mat-input{appearance:none}

.btn-add-row{
  width:100%;background:none;border:1px dashed var(--border);border-radius:var(--r);
  color:var(--t2);font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.04em;
  padding:9px;cursor:pointer;transition:all .15s;text-transform:uppercase;
}
.btn-add-row:hover{border-color:var(--gl);color:var(--gl);border-style:solid}

.mod-row{
  display:grid;grid-template-columns:90px 1fr 90px 26px;gap:6px;align-items:center;
  background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:8px 10px;
}
.mod-row label{font-size:9px;color:var(--t3);text-transform:uppercase;display:flex;align-items:center;gap:4px;white-space:nowrap}

/* TOAST */
.toast{
  position:fixed;bottom:1.2rem;right:1.2rem;z-index:300;
  background:var(--s2);border:1px solid rgba(16,124,16,.4);border-radius:5px;
  padding:10px 16px;font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0)}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--gl);flex-shrink:0}

/* export */
.exp-bar{padding:.5rem 1.5rem .5rem;display:flex;justify-content:flex-end}
.btn-exp{
  background:none;border:1px solid var(--border);border-radius:var(--r);
  color:var(--t2);font-family:inherit;font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;cursor:pointer;

<script>
// ── HORARIO (dinámico) ───────────────────────────────────────────────────────
// HORAS, SCHEDULE y MATERIAS ya NO son constantes fijas: se cargan desde
// Supabase (tablas "modulos" y "clases") al iniciar la app, y se reconstruyen
// cada vez que el usuario edita algo desde el panel "Editar horario".
//
// El nombre de la materia (no un código corto) es la clave que vincula una
// clase con sus ausencias registradas — así, si el usuario le cambia el
// nombre a una materia, lo más simple es que las ausencias viejas se sigan
// viendo bajo el nombre anterior hasta que el usuario las edite, en vez de
// quedar huérfanas. El campo se sigue llamando `mid` internamente (heredado
// del diseño original) para no tener que tocar el resto de la app, pero hoy
// contiene el nombre completo de la materia, no un código.

let HORAS = [];      // [{h, label, recreo?}]
let SCHEDULE = {};   // dia -> hora -> {mid, nombre, docente}
let MATERIAS = [];   // [{id, nombre, docente}] — derivado de SCHEDULE

const DIAS = ['LU','MA','MI','JU','VI'];
const DIA_FULL = {LU:'Lunes',MA:'Martes',MI:'Miércoles',JU:'Jueves',VI:'Viernes'};

// Rebuilds SCHEDULE and MATERIAS from flat arrays of "modulos" and "clases" rows
// (either freshly fetched from Supabase, or the in-memory copies after a local edit).
function rebuildScheduleFrom(modulosRows, clasesRows){
  HORAS = [...modulosRows]
    .sort((a,b)=>a.orden-b.orden)
    .map(m=>({h:m.codigo, label:m.label, recreo:m.es_recreo}));

  const sched = {};
  DIAS.forEach(d=>sched[d]={});
  clasesRows.forEach(c=>{
    if(!sched[c.dia]) sched[c.dia]={};
    sched[c.dia][c.modulo_codigo] = {mid:c.materia, nombre:c.materia, docente:c.docente||''};
  });
  SCHEDULE = sched;

  // Derive the materia catalog: one entry per unique materia name,
  // using the first docente found for it as the "representative" one
  // (shown in dropdowns; a materia can have different docentes on different days).
  const byName = {};
  clasesRows.forEach(c=>{
    if(!byName[c.materia]) byName[c.materia] = {id:c.materia, nombre:c.materia, docente:c.docente||''};
  });
  MATERIAS = Object.values(byName).sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
}

// ── SUPABASE ─────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://axxmgcfeufbiaxirpvoo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4eG1nY2ZldWZiaWF4aXJwdm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MTk5NTksImV4cCI6MjA5ODI5NTk1OX0.5DzpY8uhrbhDKrubHcEaGWXgOfMBuOU6cB3X5DbQm9A';

// Guard against the supabase-js CDN failing to load (slow network, blocked CDN, etc).
// Without this guard, an exception here would stop the ENTIRE script from running —
// including the click listeners for the calendar — leaving the UI looking "frozen".
let sb = null;
try {
  if (window.supabase) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } else {
    console.error('supabase-js no se cargó (CDN bloqueado o sin conexión). La app funcionará solo con el caché local.');
  }
} catch(err) {
  console.error('No se pudo inicializar el cliente de Supabase:', err);
}

// Local cache key (used as instant-load fallback / offline backup, NOT source of truth)
const CACHE_KEY = 'abs4b_v2_cache';

// absences is the in-memory source the rest of the app reads from.
// Seed it from localStorage so the UI has something to show immediately,
// then refresh from Supabase as soon as the network call resolves.
let absences = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');

function cacheAbsences(){
  localStorage.setItem(CACHE_KEY, JSON.stringify(absences));
}

// Map a Supabase row to the shape the rest of the app expects (it keys off `id`, `ts`, etc.)
function fromRow(row){
  return { id:row.id, mid:row.mid, dia:row.dia, hora:row.hora, week:row.week,
           obs:row.obs||'', docente:row.docente||'', ts:row.ts };
}

async function loadAbsences(){
  if(!sb){ showToast('Sin conexión a la base — usando datos locales'); return; }
  try {
    const {data, error} = await sb.from('ausencias').select('*').order('ts',{ascending:true});
    if(error){
      console.error('Error cargando ausencias de Supabase:', error);
      showToast('Sin conexión — mostrando datos guardados localmente');
      return; // keep whatever was in the local cache
    }
    absences = data.map(fromRow);
    cacheAbsences();
    render();
  } catch(err){
    console.error('Excepción cargando ausencias:', err);
    showToast('Sin conexión — mostrando datos guardados localmente');
  }
}

// Local cache for the schedule too, so the app paints something useful even
// the first instant before Supabase responds (or if it's briefly offline).
const HORARIO_CACHE_KEY = 'abs4b_horario_cache';

function cacheHorario(modulosRows, clasesRows){
  localStorage.setItem(HORARIO_CACHE_KEY, JSON.stringify({modulos:modulosRows, clases:clasesRows}));
}

async function loadHorario(){
  // Seed from cache first so there's never a blank schedule on screen
  try {
    const cached = JSON.parse(localStorage.getItem(HORARIO_CACHE_KEY)||'null');
    if(cached) rebuildScheduleFrom(cached.modulos, cached.clases);
  } catch(err){ /* ignore corrupt cache */ }

  if(!sb) return;
  try {
    const [modRes, clasesRes] = await Promise.all([
      sb.from('modulos').select('*').order('orden',{ascending:true}),
      sb.from('clases').select('*'),
    ]);
    if(modRes.error || clasesRes.error){
      console.error('Error cargando horario de Supabase:', modRes.error||clasesRes.error);
      showToast('Sin conexión — mostrando el horario guardado localmente');
      return;
    }
    rebuildScheduleFrom(modRes.data, clasesRes.data);
    cacheHorario(modRes.data, clasesRes.data);
    render();
  } catch(err){
    console.error('Excepción cargando horario:', err);
    showToast('Sin conexión — mostrando el horario guardado localmente');
  }
}

// Live sync: if the data changes from another device/tab, reflect it here automatically.
function subscribeRealtime(){
  if(!sb) return;
  try {
    sb.channel('ausencias-changes')
      .on('postgres_changes', {event:'*', schema:'public', table:'ausencias'}, ()=>{
        loadAbsences();
      })
      .subscribe();
    sb.channel('horario-changes')
      .on('postgres_changes', {event:'*', schema:'public', table:'modulos'}, ()=>{ loadHorario(); })
      .on('postgres_changes', {event:'*', schema:'public', table:'clases'}, ()=>{ loadHorario(); })
      .subscribe();
  } catch(err){
    console.error('No se pudo suscribir a realtime:', err);
  }
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function getISOWeek(d){
  const dt = d ? new Date(d) : new Date();
  const jan4 = new Date(dt.getFullYear(),0,4);
  const s = new Date(jan4);
  s.setDate(jan4.getDate()-((jan4.getDay()+6)%7));
  const w = Math.floor((dt-s)/(7*86400e3))+1;
  return dt.getFullYear()+'-W'+String(w).padStart(2,'0');
}

// _selectedWeek holds the active week string ("YYYY-Www"), replacing the
// native <input type=week> value as the source of truth for currentWeek().
let _selectedWeek = getISOWeek();
function currentWeek(){ return _selectedWeek; }

// ── WEEK PICKER (custom) ─────────────────────────────────────────────────────
// _popMonth tracks which calendar month the dropdown is currently showing —
// independent from the selected week, so browsing months doesn't change the selection.
let _popMonth = null; // {y, m} 0-indexed month

function weekBtnLabel(ws){
  const [y,w] = ws.split('-W');
  return `Semana ${Number(w)}, ${y}`;
}

function updateWeekBtnLabel(){
  document.getElementById('weekBtnLabel').textContent = weekBtnLabel(_selectedWeek);
}

function setSelectedWeek(ws){
  _selectedWeek = ws;
  updateWeekBtnLabel();
  render();
}

function openWeekPop(){
  const mon = weekToMonday(_selectedWeek);
  _popMonth = {y:mon.getFullYear(), m:mon.getMonth()};
  renderWeekPop();
  document.getElementById('weekPop').classList.add('open');
  document.getElementById('weekBtn').classList.add('open');
}

function closeWeekPop(){
  document.getElementById('weekPop').classList.remove('open');
  document.getElementById('weekBtn').classList.remove('open');
}

function toggleWeekPop(){
  const isOpen = document.getElementById('weekPop').classList.contains('open');
  isOpen ? closeWeekPop() : openWeekPop();
}

function shiftPopMonth(delta){
  let {y,m} = _popMonth;
  m += delta;
  if(m<0){m=11;y--;} else if(m>11){m=0;y++;}
  _popMonth = {y,m};
  renderWeekPop();
}

const MES_NOMBRES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function renderWeekPop(){
  const {y,m} = _popMonth;
  const pop = document.getElementById('weekPop');

  // Build the set of week-strings that contain at least one absence, for the dot indicator
  const weeksWithAbsences = new Set(absences.map(a=>a.week));

  // First day of the displayed month, walked back to the Monday on/before it
  const first = new Date(y,m,1);
  const gridStart = new Date(first);
  const back = (first.getDay()+6)%7; // days since Monday
  gridStart.setDate(first.getDate()-back);

  // Build 6 week-rows (covers any month layout)
  let rowsHtml = '';
  for(let r=0;r<6;r++){
    const rowStart = new Date(gridStart);
    rowStart.setDate(gridStart.getDate()+r*7);
    const ws = getISOWeek(rowStart);
    const isSelected = ws===_selectedWeek;
    const isCurrent = ws===getISOWeek();
    const hasAbs = weeksWithAbsences.has(ws);

    let daysHtml='';
    for(let d=0;d<7;d++){
      const day = new Date(rowStart);
      day.setDate(rowStart.getDate()+d);
      const dim = day.getMonth()!==m;
      daysHtml += `<div class="wp-day ${dim?'dim':''}">${day.getDate()}</div>`;
    }

    rowsHtml += `<div class="wp-week-row ${isSelected?'selected':''} ${isCurrent?'current':''}" data-week="${ws}">
      ${daysHtml}
    </div>`;
  }

  pop.innerHTML = `
    <div class="wp-head">
      <div class="wp-month">${MES_NOMBRES[m]} de ${y}</div>
      <div class="wp-nav">
        <button type="button" data-nav="-1">‹</button>
        <button type="button" data-nav="1">›</button>
      </div>
    </div>
    <div class="wp-grid">
      <div class="wp-dow">L</div><div class="wp-dow">M</div><div class="wp-dow">X</div>
      <div class="wp-dow">J</div><div class="wp-dow">V</div><div class="wp-dow">S</div><div class="wp-dow">D</div>
      ${rowsHtml}
    </div>
    <div class="wp-legend"><span class="dot"></span> Semana con ausencias registradas</div>
    <div class="wp-foot">
      <button class="wp-link" type="button" data-action="clear-week">Borrar</button>
      <button class="wp-link accent" type="button" data-action="this-week">Esta semana</button>
    </div>
  `;

  // Second pass: mark the has-absence dot on each row's days (one dot is enough,
  // placed on the first day cell of the row for a clean look)
  pop.querySelectorAll('.wp-week-row').forEach(row=>{
    const ws = row.dataset.week;
    if(weeksWithAbsences.has(ws)){
      row.querySelector('.wp-day')?.classList.add('has-absence');
    }
  });
}

// Today's day index 0=Mon..4=Fri, null if weekend
function todayDia(){
  const d = new Date().getDay(); // 0=Sun
  const map={1:'LU',2:'MA',3:'MI',4:'JU',5:'VI'};
  return map[d] || null;
}

// Get Monday date of a week string
function weekToMonday(ws){
  const [y,w] = ws.split('-W').map(Number);
  const jan4 = new Date(y,0,4);
  const s = new Date(jan4);
  s.setDate(jan4.getDate()-((jan4.getDay()+6)%7));
  s.setDate(s.getDate()+(w-1)*7);
  return s;
}

function diaDate(weekStr, dia){
  const off = {LU:0,MA:1,MI:2,JU:3,VI:4};
  const m = weekToMonday(weekStr);
  m.setDate(m.getDate()+off[dia]);
  return m;
}

function fmtDate(d){
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
}

function fmtDateFull(d){
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function isCurrentWeek(ws){
  return ws === getISOWeek();
}

// Key for an absence lookup: week+dia+hora+mid
function absKey(a){ return `${a.week}|${a.dia}|${a.hora}|${a.mid}`; }

// NOTE: persistence now goes through Supabase (see saveAbsence/deleteAbs below).
// localStorage is only used as a read cache via cacheAbsences(), not as the source of truth.

function toggleBreakdown(){
  document.getElementById('breakdown').classList.toggle('open');
}

// ── TOTAL HOURS PER MATERIA ──────────────────────────────────────────────────
function totalSlots(){
  // Count all slots in SCHEDULE per mid, plus a grand total.
  // Guarded against SCHEDULE being empty/incomplete (e.g. the very first paint
  // before loadHorario() has populated anything, on a brand-new device with no cache).
  const t={};
  let total=0;
  DIAS.forEach(d=>{
    Object.values(SCHEDULE[d]||{}).forEach(s=>{
      t[s.mid]=(t[s.mid]||0)+1;
      total++;
    });
  });
  t._total=total;
  return t;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const week = currentWeek();
  const today = todayDia();
  const showingCurrentWeek = isCurrentWeek(week);

  // Build absence sets for quick lookup
  const absSet = new Set(absences.map(absKey));
  function isAbsent(mid,dia,hora){
    return absSet.has(`${week}|${dia}|${hora}|${mid}`);
  }

  // Stats
  const slots = totalSlots();          // {_total, mid: count, ...}
  const weekTotal = slots._total;      // horas de clase totales en la semana
  const weekAbs = absences.filter(a=>a.week===week).length;
  const totalAbs = absences.length;
  const remaining = Math.max(0, weekTotal - weekAbs);
  const pct = weekTotal>0 ? Math.round((remaining/weekTotal)*100) : 100;

  // Worst subject THIS WEEK (more actionable than all-time)
  const byMatWeek={};
  absences.filter(a=>a.week===week).forEach(a=>byMatWeek[a.mid]=(byMatWeek[a.mid]||0)+1);
  let worst='—';
  if(Object.keys(byMatWeek).length){
    const wid=Object.entries(byMatWeek).sort((a,b)=>b[1]-a[1])[0][0];
    worst=(MATERIAS.find(m=>m.id===wid)||{nombre:wid}).nombre;
  }

  document.getElementById('s-remain').textContent=remaining;
  document.getElementById('s-remain-total').textContent=weekTotal;
  document.getElementById('s-week').textContent=weekAbs;
  document.getElementById('s-total').textContent=totalAbs;
  document.getElementById('s-worst').textContent=worst;

  // Progress bar: green at 100%, shifts to amber then red as hours are lost
  const bar=document.getElementById('s-bar');
  const remainV=document.getElementById('s-remain');
  bar.style.width=pct+'%';
  if(pct>=70){
    bar.style.background='linear-gradient(90deg,var(--gl),var(--gn))';
    remainV.style.color='var(--gn)';
  } else if(pct>=40){
    bar.style.background='linear-gradient(90deg,var(--warn),#ffd35c)';
    remainV.style.color='var(--warn)';
  } else {
    bar.style.background='linear-gradient(90deg,var(--danger),#ff7a85)';
    remainV.style.color='var(--danger)';
  }

  // Breakdown panel (per-subject, this week): rebuilt every render, shown if open
  const bd=document.getElementById('breakdown');
  const matRows=MATERIAS
    .map(m=>({m, total:slots[m.id]||0, lost:byMatWeek[m.id]||0}))
    .filter(r=>r.total>0)
    .sort((a,b)=>b.lost-a.lost || b.total-a.total);
  bd.innerHTML=matRows.map(r=>{
    const p = r.total>0 ? Math.min(100,(r.lost/r.total)*100) : 0;
    return `<div class="bd-row">
      <div class="bd-name">${r.m.nombre}</div>
      <div class="bd-track"><div class="bd-fill" style="width:${p}%"></div></div>
      <div class="bd-count">${r.lost}/${r.total}</div>
    </div>`;
  }).join('');

  // ── HEAD ──
  let head=`<tr><th style="text-align:left;padding:8px 10px">
    <span style="font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase">Módulo</span>
  </th>`;
  DIAS.forEach(d=>{
    const isTod = showingCurrentWeek && d===today;
    const dateStr = fmtDate(diaDate(week,d));
    head+=`<th class="${isTod?'today-col':''}">
      <div class="day-name">${d}</div>
      <div class="day-date">${DIA_FULL[d]} ${dateStr}</div>
      ${isTod?'<div class="today-badge">HOY</div>':''}
    </th>`;
  });
  head+='</tr>';
  document.getElementById('calHead').innerHTML=head;

  // ── BODY ──
  let body='';
  HORAS.forEach(hr=>{
    if(hr.recreo){
      body+=`<tr class="recreo-row"><td colspan="6">${hr.label}</td></tr>`;
      return;
    }

    body+=`<tr>`;
    // Row header with hora label
    body+=`<td class="row-header" style="padding:8px 10px">
      <div style="font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase">${hr.label}</div>
    </td>`;

    DIAS.forEach(d=>{
      const isTod = showingCurrentWeek && d===today;
      const slot = SCHEDULE[d] && SCHEDULE[d][hr.h];
      if(!slot){
        body+=`<td class="cell no-class ${isTod?'today-col':''}"></td>`;
        return;
      }
      const absent = isAbsent(slot.mid,d,hr.h);
      const aid = absent ? absences.find(a=>a.week===week&&a.dia===d&&a.hora===hr.h&&a.mid===slot.mid)?.id : null;
      body+=`<td class="cell ${isTod?'today-col':''}">
        <div class="slot">
          <div class="slot-inner ${absent?'absent':''}"
               ${absent?'':`data-action="quickadd" data-mid="${slot.mid}" data-dia="${d}" data-hora="${hr.h}"`}
               style="${absent?'cursor:default':'cursor:pointer'}">
            <div>
              <div style="font-size:11px;font-weight:700;color:${absent?'var(--danger)':'var(--text)'}">${slot.nombre}</div>
              <div style="font-size:9px;color:${absent?'rgba(231,72,86,.6)':'var(--t3)'};margin-top:1px">${slot.docente}</div>
            </div>
            <div class="slot-plus" ${absent&&aid?`data-action="delete" data-id="${aid}"`:''}>
              ${absent?'✕':'+'}
            </div>
          </div>
        </div>
      </td>`;
    });
    body+='</tr>';
  });

  document.getElementById('calBody').innerHTML=body;

  // ── HISTORY ──
  const recent=[...absences].reverse().slice(0,40);
  const hl=document.getElementById('histList');
  if(!recent.length){
    hl.innerHTML='<div class="empty">Sin registros aún — tocá el + en cualquier clase para registrar una ausencia.</div>';
    return;
  }
  hl.innerHTML=recent.map(a=>{
    const m=MATERIAS.find(x=>x.id===a.mid);
    const name=m?m.nombre:a.mid;
    const doc=m?m.docente:'';
    // Real date the class was missed (derived from week+dia), not when the record was created
    const fecha=fmtDateFull(diaDate(a.week,a.dia));
    const wl=a.week.replace('-W',' / Sem. ');
    const horaObj=HORAS.find(h=>h.h===a.hora);
    const horaLbl=horaObj?horaObj.label:a.hora;
    return `<div class="hist-item">
      <span class="hw-badge">${wl}</span>
      <div class="hd-badge ${a.dia}">${a.dia}</div>
      <div class="hi-info">
        <div class="hi-name">${name}</div>
        <div class="hi-meta">${doc} · ${DIA_FULL[a.dia]} · ${horaLbl} · ${fecha}</div>
        ${a.obs?`<div class="hi-obs">${a.obs}</div>`:''}
      </div>
      <button class="hi-del" onclick="deleteAbs(${a.id})" title="Eliminar">✕</button>
    </div>`;
  }).join('');

  // Keep the week-picker dots in sync if it's open while data changes
  // (e.g. another device adds an absence via realtime)
  const wpop = document.getElementById('weekPop');
  if(wpop && wpop.classList.contains('open')) renderWeekPop();
}

function onMateriaChange(){

    const inSched=Object.entries(SCHEDULE[d]||{}).some(([h,s])=>s.mid===mid);

function onDiaChange(){

  const hours=Object.entries(SCHEDULE[dia]||{})

let _reportPeriod = 'week'; // 'week' | 'month' | 'year'

function openReportModal(){

  // there's no requirement to remember it across sessions, and it's one field)
  renderReportPreview();

function setReportPeriod(period){
  _reportPeriod = period;
  document.querySelectorAll('.period-tab').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.period===period);
  });
  renderReportPreview();
}

// Returns {label, absences, weekTotal (only meaningful for 'week')} for the chosen period
function getReportData(){
  const today = new Date();
  let filtered, label;

  if(_reportPeriod==='week'){
    const ws = currentWeek();
    filtered = absences.filter(a=>a.week===ws);
    const mon = weekToMonday(ws);
    const fri = new Date(mon); fri.setDate(mon.getDate()+4);
    label = `Semana del ${fmtDate(mon)} al ${fmtDateFull(fri)}`;
  } else if(_reportPeriod==='month'){
    const y=today.getFullYear(), m=today.getMonth();
    filtered = absences.filter(a=>{
      const d = diaDate(a.week,a.dia);
      return d.getFullYear()===y && d.getMonth()===m;
    });
    label = `${MES_NOMBRES[m].charAt(0).toUpperCase()+MES_NOMBRES[m].slice(1)} de ${y}`;
  } else { // year
    const y=today.getFullYear();
    filtered = absences.filter(a=>diaDate(a.week,a.dia).getFullYear()===y);
    label = `Año ${y}`;
  }

  // Sort chronologically by real absence date
  filtered = [...filtered].sort((a,b)=>diaDate(a.week,a.dia)-diaDate(b.week,b.dia));
  return {label, absences:filtered};
}

function renderReportPreview(){
  const {label, absences:list} = getReportData();
  const prev = document.getElementById('repPreview');
  if(!list.length){
    prev.innerHTML = `<b>${label}</b><span class="rep-warn">No hay ausencias registradas en este período. El informe se generará igualmente, indicando asistencia completa.</span>`;
    return;
  }
  const byMat={};
  list.forEach(a=>byMat[a.mid]=(byMat[a.mid]||0)+1);
  const peor = Object.entries(byMat).sort((a,b)=>b[1]-a[1])[0];
  const peorNombre = peor ? (MATERIAS.find(m=>m.id===peor[0])||{nombre:peor[0]}).nombre : '—';
  prev.innerHTML = `<b>${label}</b><br>${list.length} hora${list.length===1?'':'s'} cátedra perdida${list.length===1?'':'s'} · Materia más afectada: <b>${peorNombre}</b>`;
}

// Works on a local "draft" copy so the user can make several changes and only
// touch the database once, when they hit "Guardar cambios". Each draft row
// keeps its original Supabase `id` (so we know whether to update or insert)
// plus a temporary local `_tmpId` for brand-new rows that don't have one yet.
let _draftClases = [];   // [{_tmpId, id?, dia, modulo_codigo, materia, docente}]
let _draftModulos = [];  // [{_tmpId, id?, codigo, label, es_recreo, orden}]
let _tmpIdCounter = 1;

function openScheduleEditor(){
  // Snapshot the current schedule into editable rows
  _draftClases = [];
  DIAS.forEach(d=>{
    Object.entries(SCHEDULE[d]||{}).forEach(([modulo_codigo, slot])=>{
      _draftClases.push({_tmpId:_tmpIdCounter++, dia:d, modulo_codigo, materia:slot.nombre, docente:slot.docente});
    });
  });
  _draftModulos = HORAS.map(h=>({_tmpId:_tmpIdCounter++, codigo:h.h, label:h.label, es_recreo:!!h.recreo}));

  setSchedTab('materias');
  renderSchedMateriasTab();
  renderSchedModulosTab();
  document.getElementById('schedOverlay').classList.add('open');
}

function closeScheduleEditor(){
  document.getElementById('schedOverlay').classList.remove('open');
}

  document.getElementById('schedTabModulos').style.display  = tab==='modulos'  ? '' : 'none';

function renderSchedMateriasTab(){
  const list = document.getElementById('schedMatList');
  // Group draft clases by materia name
  const groups = {};
  _draftClases.forEach(c=>{
    if(!groups[c.materia]) groups[c.materia]=[];
    groups[c.materia].push(c);
  });
  const names = Object.keys(groups).sort((a,b)=>a.localeCompare(b,'es'));

  if(!names.length){
    list.innerHTML = '<div class="empty">No hay materias cargadas. Usá "+ Agregar clase" para empezar.</div>';
    return;
  }

  list.innerHTML = names.map(name=>{
    const rows = groups[name];
    const rowsHtml = rows.map(c=>`
      <div class="clase-row" data-tmpid="${c._tmpId}">
        <select class="mat-input sched-dia" data-tmpid="${c._tmpId}">
          ${DIAS.map(d=>`<option value="${d}" ${d===c.dia?'selected':''}>${DIA_FULL[d]}</option>`).join('')}
        </select>
        <select class="mat-input sched-modulo" data-tmpid="${c._tmpId}">
          ${_draftModulos.filter(m=>!m.es_recreo).map(m=>`<option value="${m.codigo}" ${m.codigo===c.modulo_codigo?'selected':''}>${m.label}</option>`).join('')}
        </select>
        <button class="btn-icon" type="button" data-action="del-clase" data-tmpid="${c._tmpId}" title="Quitar esta clase">✕</button>
      </div>
    `).join('');

    return `<div class="mat-group" data-materia="${name.replace(/"/g,'&quot;')}">
      <div class="mat-group-head">
        <input class="mat-input mat-name" data-field="materia" data-materia="${name.replace(/"/g,'&quot;')}" value="${name}" placeholder="Nombre de la materia">
        <input class="mat-input" data-field="docente" data-materia="${name.replace(/"/g,'&quot;')}" value="${rows[0].docente||''}" placeholder="Docente">
      </div>
      ${rowsHtml}
    </div>`;
  }).join('');
}

// Delegated events for the "materias" tab: text edits, día/módulo selects, delete
document.getElementById('schedMatList').addEventListener('input', e=>{
  const field = e.target.dataset.field;
  if(field){
    // Renaming a materia/docente applies to ALL its rows at once
    const materiaKey = e.target.dataset.materia;
    _draftClases.forEach(c=>{
      if(c.materia===materiaKey) c[field] = e.target.value;
    });
    // Keep the dataset key in sync so subsequent edits on the same group still match
    if(field==='materia'){
      document.querySelectorAll(`[data-materia]`).forEach(el=>{
        if(el.dataset.materia===materiaKey) el.dataset.materia = e.target.value;
      });
    }
    return;
  }
  if(e.target.classList.contains('sched-dia')){
    const row = _draftClases.find(c=>c._tmpId===Number(e.target.dataset.tmpid));
    if(row) row.dia = e.target.value;
  }
  if(e.target.classList.contains('sched-modulo')){
    const row = _draftClases.find(c=>c._tmpId===Number(e.target.dataset.tmpid));
    if(row) row.modulo_codigo = e.target.value;
  }
});

  const row = _draftModulos.find(m=>m._tmpId===Number(e.target.dataset.tmpid));
  if(!row) return;

document.getElementById('schedModList').addEventListener('click', e=>{
  const delBtn = e.target.closest('[data-action="del-modulo"]');
  if(delBtn){
    const tmpId = Number(delBtn.dataset.tmpid);
    const removed = _draftModulos.find(m=>m._tmpId===tmpId);
    _draftModulos = _draftModulos.filter(m=>m._tmpId!==tmpId);
    // Also drop any clases that were sitting in the módulo we just removed,
    // otherwise they'd point to a módulo_codigo that no longer exists.
    if(removed) _draftClases = _draftClases.filter(c=>c.modulo_codigo!==removed.codigo);
    renderSchedModulosTab();
    renderSchedMateriasTab();
  }
});

async function saveScheduleEditor(){
  if(!sb){
    showToast('Sin conexión a la base — no se pudo guardar el horario');
    return;
  }

  // Basic validation before touching the database
  const codigos = _draftModulos.map(m=>m.codigo.trim());
  if(codigos.some(c=>!c)){
    showToast('Todos los módulos necesitan un código'); return;
  }
  if(new Set(codigos).size !== codigos.length){
    showToast('Hay códigos de módulo repetidos — deben ser únicos'); return;
  }
  if(_draftClases.some(c=>!c.materia.trim())){
    showToast('Hay una materia sin nombre'); return;
  }
  // No two clases on the same día+módulo (mirrors the DB unique constraint)
  const slotKeys = _draftClases.map(c=>`${c.dia}|${c.modulo_codigo}`);
  if(new Set(slotKeys).size !== slotKeys.length){
    showToast('Hay dos clases en el mismo día y módulo — revisá los horarios'); return;
  }

  try {
    // Replace-all strategy: simplest way to keep modulos/clases in sync with
    // the draft without diffing row-by-row. Safe here because these tables
    // are small (a school week) and have no foreign keys pointing OUT of them
    // that would break — "ausencias" references materia by name (text), not
    // by the row id, so deleting and re-inserting clases doesn't orphan anything.
    const modulosPayload = _draftModulos.map(m=>({
      codigo:m.codigo.trim(), label:m.label.trim(), es_recreo:!!m.es_recreo,
      orden:_draftModulos.indexOf(m)+1,
    }));
    const clasesPayload = _draftClases.map(c=>({
      dia:c.dia, modulo_codigo:c.modulo_codigo.trim(),
      materia:c.materia.trim(), docente:c.docente.trim(),
    }));

    // Clases reference modulos by codigo (FK), so clear clases first, then
    // replace modulos, then re-insert clases — avoids FK violations either way.
    const delClases = await sb.from('clases').delete().neq('id',-1);
    if(delClases.error) throw delClases.error;

    const delModulos = await sb.from('modulos').delete().neq('id',-1);
    if(delModulos.error) throw delModulos.error;

    if(modulosPayload.length){
      const insMod = await sb.from('modulos').insert(modulosPayload);
      if(insMod.error) throw insMod.error;
    }
    if(clasesPayload.length){
      const insClases = await sb.from('clases').insert(clasesPayload);
      if(insClases.error) throw insClases.error;
    }

    await loadHorario();
    closeScheduleEditor();
    showToast('Horario actualizado');
  } catch(err){
    console.error('Error guardando el horario:', err);
    showToast('No se pudo guardar el horario — revisá tu conexión');
  }
}

function buildReportPDF(){
  const establecimiento = document.getElementById('repEstablecimiento').value.trim() || 'Establecimiento educativo no especificado';
  const director = document.getElementById('repDirector').value.trim();
  const curso = document.getElementById('repCurso').value.trim() || '4° B';
  const presentadoPor = document.getElementById('repPresentadoPor').value.trim();
  const dni = document.getElementById('repDni').value.trim();
  const {label:periodLabel, absences:list} = getReportData();

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  if(typeof doc.autoTable !== 'function'){
    throw new Error('jspdf-autotable no se cargó correctamente');
  }
  const pageW = doc.internal.pageSize.getWidth();
  const marginX = 48;
  let y = 56;

  const today = new Date();
  const fechaGeneracion = today.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const horaGeneracion = today.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

  // ── HEADER ──
  doc.setFont('helvetica','bold');
  doc.setFontSize(15);
  doc.setTextColor(20,20,20);
  doc.text('INFORME DE AUSENCIAS DOCENTES', pageW/2, y, {align:'center'});
  y += 18;
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(90,90,90);
  doc.text('Registro de horas cátedra no dictadas — elaborado por familia/tutor', pageW/2, y, {align:'center'});
  y += 22;

  doc.setDrawColor(200,200,200);
  doc.line(marginX, y, pageW-marginX, y);
  y += 22;

  // ── DATOS FORMALES ──
  doc.setFontSize(10);
  doc.setTextColor(30,30,30);
  const fieldsLeft = [
    ['Establecimiento:', establecimiento],
    ['Curso:', curso],
    ['Período informado:', periodLabel],
  ];
  const fieldsRight = [
    ['Fecha de emisión:', `${fechaGeneracion} — ${horaGeneracion} hs`],
    ['Director/a:', director || '—'],
    ['Presentado por:', presentadoPor || '—'],
  ];
  if(dni) fieldsRight.push(['DNI:', dni]);

  const colW = (pageW-marginX*2)/2;
  let yL=y, yR=y;
  fieldsLeft.forEach(([k,v])=>{
    doc.setFont('helvetica','bold'); doc.text(k, marginX, yL);
    doc.setFont('helvetica','normal'); doc.text(String(v), marginX+108, yL, {maxWidth:colW-110});
    yL += 16;
  });
  fieldsRight.forEach(([k,v])=>{
    doc.setFont('helvetica','bold'); doc.text(k, marginX+colW, yR);
    doc.setFont('helvetica','normal'); doc.text(String(v), marginX+colW+108, yR, {maxWidth:colW-110});
    yR += 16;
  });
  y = Math.max(yL,yR) + 14;

  doc.setDrawColor(200,200,200);
  doc.line(marginX, y, pageW-marginX, y);
  y += 24;

  // ── RESUMEN EJECUTIVO ──
  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.setTextColor(20,20,20);
  doc.text('1. Resumen ejecutivo', marginX, y);
  y += 18;

  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(50,50,50);

  if(!list.length){
    doc.text('No se registraron ausencias docentes durante el período informado.', marginX, y);
    y += 24;
  } else {
    const totalPerdidas = list.length;
    const diasAfectados = new Set(list.map(a=>`${a.week}|${a.dia}`)).size;
    const byMat={};
    list.forEach(a=>byMat[a.mid]=(byMat[a.mid]||0)+1);
    const sortedMat = Object.entries(byMat).sort((a,b)=>b[1]-a[1]);
    const peorNombre = sortedMat.length ? (MATERIAS.find(m=>m.id===sortedMat[0][0])||{nombre:sortedMat[0][0]}).nombre : '—';

    const summaryLines = [
      `Durante el período informado se registraron ${totalPerdidas} hora${totalPerdidas===1?'':'s'} cátedra perdida${totalPerdidas===1?'':'s'} por ausencia docente, distribuidas en ${diasAfectados} día${diasAfectados===1?'':'s'} de clase.`,
      `La materia con mayor cantidad de horas perdidas fue ${peorNombre} (${sortedMat[0][1]} hora${sortedMat[0][1]===1?'':'s'}).`,
    ];
    summaryLines.forEach(line=>{
      const wrapped = doc.splitTextToSize(line, pageW-marginX*2);
      doc.text(wrapped, marginX, y);
      y += wrapped.length*13 + 4;
    });
    y += 6;

    // Tabla resumen por materia
    const matRows = sortedMat.map(([mid,count])=>{
      const m = MATERIAS.find(x=>x.id===mid) || {nombre:mid, docente:''};
      return [m.nombre, m.docente||'—', String(count)];
    });
    doc.autoTable({
      startY:y,
      margin:{left:marginX, right:marginX},
      head:[['Materia','Docente','Horas perdidas']],
      body:matRows,
      theme:'grid',
      styles:{fontSize:9, cellPadding:5, textColor:[40,40,40]},
      headStyles:{fillColor:[20,20,20], textColor:[255,255,255], fontStyle:'bold'},
      columnStyles:{2:{halign:'center', cellWidth:90}},
    });
    y = doc.lastAutoTable.finalY + 28;
  }

  // ── DETALLE COMPLETO ──
  if(y > doc.internal.pageSize.getHeight()-120){ doc.addPage(); y=56; }
  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.setTextColor(20,20,20);
  doc.text('2. Detalle de ausencias registradas', marginX, y);
  y += 16;

  if(list.length){
    const detailRows = list.map(a=>{
      const m = MATERIAS.find(x=>x.id===a.mid) || {nombre:a.mid, docente:a.docente||''};
      const ho = HORAS.find(h=>h.h===a.hora);
      return [
        fmtDateFull(diaDate(a.week,a.dia)),
        DIA_FULL[a.dia]||a.dia,
        ho?ho.label:a.hora,
        m.nombre,
        m.docente||a.docente||'—',
        a.obs||'—',
      ];
    });
    doc.autoTable({
      startY:y,
      margin:{left:marginX, right:marginX},
      head:[['Fecha','Día','Módulo horario','Materia','Docente','Observación']],
      body:detailRows,
      theme:'striped',
      styles:{fontSize:8.5, cellPadding:5, textColor:[40,40,40]},
      headStyles:{fillColor:[16,124,16], textColor:[255,255,255], fontStyle:'bold'},
      columnStyles:{
        0:{cellWidth:62}, 1:{cellWidth:48}, 2:{cellWidth:78},
        3:{cellWidth:80}, 4:{cellWidth:80},
      },
      didDrawPage(){
        // Footer on every page
        const ph = doc.internal.pageSize.getHeight();
        doc.setFont('helvetica','normal');
        doc.setFontSize(8);
        doc.setTextColor(140,140,140);
        doc.text(`Informe generado automáticamente — ${fechaGeneracion} ${horaGeneracion} hs`, marginX, ph-28);
        doc.text(`Página ${doc.internal.getCurrentPageInfo().pageNumber}`, pageW-marginX, ph-28, {align:'right'});
      },
    });
    y = doc.lastAutoTable.finalY + 30;
  } else {
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(90,90,90);
    doc.text('Sin registros — asistencia docente completa durante el período informado.', marginX, y+8);
    y += 40;
  }

  // ── FIRMA ──
  if(y > doc.internal.pageSize.getHeight()-90){ doc.addPage(); y=56; }
  y += 20;
  doc.setDrawColor(150,150,150);
  doc.line(marginX, y, marginX+200, y);
  doc.line(pageW-marginX-200, y, pageW-marginX, y);
  y += 14;
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(90,90,90);
  doc.text(presentadoPor || 'Firma de quien presenta', marginX, y);
  doc.text('Recepción / Dirección', pageW-marginX-200, y);

  // Footer on the first page too (in case there was no table to trigger didDrawPage)
  const ph = doc.internal.pageSize.getHeight();
  doc.setFontSize(8);
  doc.setTextColor(140,140,140);
  doc.text(`Informe generado automáticamente — ${fechaGeneracion} ${horaGeneracion} hs`, marginX, ph-28);

  const periodSlug = _reportPeriod==='week' ? `semana_${currentWeek().replace('-W','')}`
                    : _reportPeriod==='month' ? `mes_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}`
                    : `anio_${today.getFullYear()}`;
  doc.save(`informe_ausencias_4B_${periodSlug}.pdf`);
  closeReportModal();
  showToast('Informe PDF generado');
}

async function saveAbsence(){
  const mid   = document.getElementById('mSel').value;
  const dia   = document.getElementById('diaSel').value;
  const hora  = document.getElementById('horaSel').value;
  const week  = document.getElementById('weekSel').value;
  const obs   = document.getElementById('obsSel').value.trim();
  if(!week){ alert('Seleccioná la semana'); return; }
  // Check duplicate
  const key=`${week}|${dia}|${hora}|${mid}`;
  if(absences.some(a=>absKey(a)===key)){
    showToast('Ya existe ese registro');
    closeModal(); return;
  }
  if(!sb){
    showToast('Sin conexión a la base — no se pudo guardar');
    closeModal(); return;
  }
  const s=SCHEDULE[dia]&&SCHEDULE[dia][hora];
  const docente = s?s.docente:'';
  closeModal();

  try {
    const {data, error} = await sb.from('ausencias')
      .insert({mid, dia, hora, week, obs, docente})
      .select()
      .single();

    if(error){
      console.error('Error guardando ausencia:', error);
      showToast('No se pudo guardar — revisá tu conexión');
      return;
    }
    absences.push(fromRow(data));
    cacheAbsences();
    render();
    showToast('Ausencia registrada');
  } catch(err){
    console.error('Excepción guardando ausencia:', err);
    showToast('No se pudo guardar — revisá tu conexión');
  }
}

async function deleteAbs(id){
  if(!sb){
    showToast('Sin conexión a la base — no se pudo eliminar');
    return;
  }
  const prev = absences;
  absences = absences.filter(a=>a.id!==id);
  cacheAbsences();
  render(); // optimistic update — feels instant

  try {
    const {error} = await sb.from('ausencias').delete().eq('id', id);
    if(error){
      console.error('Error borrando ausencia:', error);
      absences = prev; // revert if the server rejected it
      cacheAbsences();
      render();
      showToast('No se pudo eliminar — revisá tu conexión');
      return;
    }
    showToast('Registro eliminado');
  } catch(err){
    console.error('Excepción borrando ausencia:', err);
    absences = prev;
    cacheAbsences();
    render();
    showToast('No se pudo eliminar — revisá tu conexión');
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function exportCSV(){
  if(!absences.length){ alert('No hay registros aún.'); return; }
  const hdr='Semana,Fecha de la ausencia,Día,Hora,Materia,Docente,Observación,Registrado el';
  const rows=absences.map(a=>{
    const m=MATERIAS.find(x=>x.id===a.mid);
    const ho=HORAS.find(h=>h.h===a.hora);
    const fechaReal=fmtDateFull(diaDate(a.week,a.dia));
    const registradoEl=a.ts?new Date(a.ts).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
    return [a.week,fechaReal,DIA_FULL[a.dia]||a.dia,ho?ho.label:a.hora,
      m?m.nombre:a.mid,a.docente||'',a.obs||'',registradoEl]
      .map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',');
  });
  const csv='\uFEFF'+[hdr,...rows].join('\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  const el=document.createElement('a');el.href=url;el.download='ausencias_4B.csv';el.click();
  URL.revokeObjectURL(url);
}

document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget) closeModal();
});

document.getElementById('reportOverlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget) closeReportModal();
});

// Delegated click handler for calendar slots (quick-add ausencia / delete)
// Using data-attributes instead of inline onclick avoids string-escaping bugs
// when materia/dia/hora values get interpolated into the generated HTML.
document.getElementById('calBody').addEventListener('click', e=>{
  const delBtn = e.target.closest('[data-action="delete"]');
  if(delBtn){
    e.stopPropagation();
    deleteAbs(Number(delBtn.dataset.id));
    return;
  }
  const addEl = e.target.closest('[data-action="quickadd"]');
  if(addEl){
    quickAdd(addEl.dataset.mid, addEl.dataset.dia, addEl.dataset.hora);
  }
});

// ── WEEK PICKER event wiring ─────────────────────────────────────────────────
document.getElementById('weekBtn').addEventListener('click', e=>{
  e.stopPropagation();
  toggleWeekPop();
});

document.getElementById('weekPop').addEventListener('click', e=>{
  const navBtn = e.target.closest('[data-nav]');
  if(navBtn){ shiftPopMonth(Number(navBtn.dataset.nav)); return; }

  const clearBtn = e.target.closest('[data-action="clear-week"]');
  if(clearBtn){ setSelectedWeek(getISOWeek()); closeWeekPop(); return; }

  const thisWeekBtn = e.target.closest('[data-action="this-week"]');
  if(thisWeekBtn){ setSelectedWeek(getISOWeek()); closeWeekPop(); return; }

  const row = e.target.closest('.wp-week-row');
  if(row){ setSelectedWeek(row.dataset.week); closeWeekPop(); }
});

// Close the popover when clicking anywhere outside it
document.addEventListener('click', e=>{
  if(!e.target.closest('#weekPicker')) closeWeekPop();
});

// Init
updateWeekBtnLabel();
loadHorario();        // seeds from local cache synchronously-ish, then refreshes from Supabase
render();             // instant paint using whatever was cached locally
loadAbsences();       // then refresh with the real data from Supabase
subscribeRealtime();  // and stay in sync if it changes from another device
</script>
